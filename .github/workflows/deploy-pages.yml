name: Deploy to GitHub Pages

# main への push で静的サイト（リポジトリ直下の HTML）を GitHub Pages へ自動デプロイする。
# configure-pages の enablement: true により、Pages 未設定でもワークフローから
# 自動で有効化する（Settings での手動設定は不要）。

on:
  push:
    branches: [main]
  workflow_dispatch:

# GitHub Pages へのデプロイに必要な権限
permissions:
  contents: read
  pages: write
  id-token: write

# 同時実行は1つに絞り、進行中のデプロイはキャンセルしない
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5
        with:
          # Pages が未設定でも、ワークフローから自動で有効化する
          # （Settings での手動設定が不要になる）
          enablement: true

      - name: Upload site artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # リポジトリ直下に index.html があるためルートをアップロード
          path: .

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
