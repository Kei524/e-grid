name: Deploy to GitHub Pages

# 静的サイト（リポジトリ直下の HTML）を GitHub Pages へ自動デプロイする。
# 事前準備（1回だけ）: Settings → Pages → Source を「GitHub Actions」に設定。
# 注: github-pages 環境はデフォルトブランチからのデプロイのみ許可するため、
#     当面はデフォルトブランチ（作業ブランチ）でもデプロイする。
#     デフォルトブランチを main に変更後は main のみで運用してよい。

on:
  push:
    branches:
      - main
      - claude/practical-lamport-UB9ec
  workflow_dispatch:

# GitHub Pages へのデプロイに必要な権限
permissions:
  contents: read
  pages: write
  id-token: write

# 同時実行は1つに絞り、進行中のデプロイはキャンセルしない
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Upload site artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # リポジトリ直下に index.html があるためルートをアップロード
          path: .

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
